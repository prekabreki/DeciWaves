name: test
on:
  push:
    branches: [main]
  pull_request:
  workflow_call:
jobs:
  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
          cache: pip
      - uses: federicocarboni/setup-ffmpeg@37062fbf7149fc5578d6c57e08aed62458b375d6 # v3.1
        with:
          ffmpeg-version: "8.1.2"
      - run: pip install -e ".[test]" ruff==0.15.21 pytest==9.1.1
      - run: ruff check src tests tools
      # Without the [gui] extra: the GUI Qt tests skip cleanly (importorskip PySide6),
      # and no Qt binding / pytest-qt is present -- proves the base install stays green.
      - run: python -m pytest -q
      # With the [gui] extra (+ pytest-qt): the GUI tests now execute, headless.
      - run: pip install -e ".[gui-test]"
      - run: python -m pytest -q
        env:
          QT_QPA_PLATFORM: offscreen
